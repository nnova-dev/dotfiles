##################################
#     LOGIQUE DES RACCOURCIS     #
##################################
#  Combinaison   |  Role         #
# ---------------|-------------- #
#  Super         |  Quick Action #
#  Super + Shift |  Movements    #
#  Super + Ctrl  |  Precision    #
#  Super + Alt   |  Submaps      #
##################################

# Variables
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$browser = firefox-developer-edition
$sBrowser = librewolf
$changeWp = koda-wallpaper
$music = spotify

$mainMod = SUPER
$hyper = SUPER CTRL ALT SHIFT

# Run applications
bindd = $mainMod, Return, Terminal, exec, $terminal
bindd = $mainMod, B, Browser, exec, $browser
bindd = $mainMod, T, File Manager, exec, $fileManager
bindd = $mainMod, I, Typst, exec, koda-launch-webapp https://typst.app
bindd = $mainMod, A, Gemini, exec, koda-launch-webapp https://gemini.google.com
bindd = $mainMod, M, Music, exec, $music

# Menu
bindd = $mainMod CTRL, Space, Change Wallpaper, exec, $changeWp
bindd = $mainMod, D, Koda menu, exec, $menu

# Control tiling
bindd = $mainMod, W, Close app, killactive,
bindd = $mainMod, V, Floating window, togglefloating,
bindd = $mainMod, P, Pseudo window, pseudo,
bindd = $mainMod, J, Split window, layoutmsg, togglesplit,
bindd = $mainMod, K, Swap window, layoutmsg, swapsplit,
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move focus
bindd = $mainMod ALT, H, Move left, movefocus, l
bindd = $mainMod ALT, L, Move right, movefocus, r
bindd = $mainMod ALT, K, Move up, movefocus, u
bindd = $mainMod ALT, J, Move down, movefocus, d

# Fullscreen
bindd = $mainMod, F, Full screen, fullscreen, 0
bindd = $mainMod SHIFT, F, Full width, fullscreen, 1
bindd = $mainMod CTRL, F, Semi-Full screen, fullscreenstate, 0 2

# Captures
bindd = , Print, Area Screenshots, exec, ~/.local/share/koda/bin/koda-screenshot
bindd = SHIFT, Print, Full Screenshots, exec, grim $HOME/Pictures/Screenshots/full_$(date +%Y%m%d_%H%M%S).png && notify-send "Écran capturé"
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a

# Utils
bindd = $mainMod SHIFT, Space, Toggle waybar, exec, ~/.local/share/koda/bin/koda-toggle-waybar

# Switch workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT ALT, 1, movetoworkspace, 1
bind = $mainMod SHIFT ALT, 2, movetoworkspace, 2
bind = $mainMod SHIFT ALT, 3, movetoworkspace, 3
bind = $mainMod SHIFT ALT, 4, movetoworkspace, 4
bind = $mainMod SHIFT ALT, 5, movetoworkspace, 5
bind = $mainMod SHIFT ALT, 6, movetoworkspace, 6
bind = $mainMod SHIFT ALT, 7, movetoworkspace, 7
bind = $mainMod SHIFT ALT, 8, movetoworkspace, 8
bind = $mainMod SHIFT ALT, 9, movetoworkspace, 9
bind = $mainMod SHIFT ALT, 0, movetoworkspace, 10

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
bindd = SUPER SHIFT, code:10, Move window silently to workspace 1, movetoworkspacesilent, 1
bindd = SUPER SHIFT, code:11, Move window silently to workspace 2, movetoworkspacesilent, 2
bindd = SUPER SHIFT, code:12, Move window silently to workspace 3, movetoworkspacesilent, 3
bindd = SUPER SHIFT, code:13, Move window silently to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT, code:14, Move window silently to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT, code:15, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT, code:16, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT, code:17, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT, code:18, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT, code:19, Move window silently to workspace 10, movetoworkspacesilent, 10

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, LEFT, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap window up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap window down, swapwindow, d

# Resize active window
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down, resizeactive, 0 100

# Special workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Fn keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# --- CONFIGURATION DES COULEURS ET TERMINAL ---
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set -g default-terminal "${TERM}"

# --- PRÉFIXE ---
unbind C-a
set-option -g prefix C-b
bind C-b send-prefix

# --- OPTIONS GÉNÉRALES ---
set -g base-index 1              # Les fenêtres commencent à 1
set -g detach-on-destroy off     # Ne pas quitter tmux à la fermeture d'une session
set -g escape-time 0             # Pas de délai pour Échap (réactivité Neovim)
set -g history-limit 1000000     # Historique énorme
set -g renumber-windows on       # Renumérotation auto des fenêtres
set -g set-clipboard on          # Utilisation du presse-papiers système
set -g status-position top       # Barre en haut (Style Apple/DHH)
setw -g mode-keys vi             # Navigation style Vi pour le scroll/copy

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- STYLE CYBERDREAM (Couleurs exactes) ---
# Fond: #16181a | Magenta: #ff5ef1 | Cyan/Bleu: #5effff | Gris: #7b8496

# Barre de statut transparente
set -g status-bg default
set -g status-style bg=default

# Session actuelle à gauche (Cyan)
set -g status-left "#[fg=#5effff,bold]  #S #[fg=#ffffff,none]| "
set -g status-left-length 20

# Fenêtres inactives (Gris discret)
setw -g window-status-style 'fg=#7b8496,bg=default'
setw -g window-status-format ' #I:#W '

# Fenêtre active (Magenta électrique)
setw -g window-status-current-style 'fg=#ff5ef1,bold,bg=default'
setw -g window-status-current-format ' #I:#W#{?window_zoomed_flag,  ,} '

# Heure à droite (Gris discret)
set -g status-right "#[fg=#7b8496]%H:%M "

# Bordures des panneaux
set -g pane-active-border-style 'fg=#ff5ef1,bg=default'
set -g pane-border-style 'fg=#3c4048,bg=default'

# Menu de commande et sélection (Mode copie)
set -g message-style 'fg=#ff5ef1,bg=#16181a,bold'
setw -g mode-style 'fg=#16181a,bg=#ff5ef1,bold'

# --- CONFIGURATION DES PLUGINS (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

# --- CONFIGURATION FLOAX (Terminal flottant) ---
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#ff5ef1'
set -g @floax-text-color '#5effff'
set -g @floax-bind 'p'

# --- CONFIGURATION SESSIONX ---
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'

# --- RESTAURATION AUTOMATIQUE ---
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Initialisation de TPM (doit rester à la toute fin)
run '~/.tmux/plugins/tpm/tpm'
